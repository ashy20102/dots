[main]
# Launch fuzzel as an overlay over your current workspace
layer = overlay
prompt = "> "
icon-theme = "Papirus"
font = "JetBrains Mono:size=12"
fields = name,generic,comment,categories,filename,exec
terminal = "kitty"  # Or your preferred terminal emulator
fuzzy = yes

[colors]
background=1a1b26dd
text=c0caf5ff
match=7aa2f7ff
selection=33467cff
selection-text=c0caf5ff
selection-match=7aa2f7ff
border=7aa2f7ff

[border]
//width = 2
//radius = 12

[dmenu]
exit-immediately-if-empty = yes
